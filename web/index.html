<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white min-h-screen flex items-center justify-center">
    <!-- Step 1 -->
    <div id="step1" class="w-6/12">
      <h2 class="text-2xl font-bold mb-6 text-center">Select Content Type</h2>
      <div class="flex justify-center mb-6">
        <button
          id="fileBtn"
          class="px-4 py-2 rounded-l bg-blue-500 text-white font-semibold focus:outline-none"
        >
          File
        </button>
        <button
          id="youtubeBtn"
          class="px-4 py-2 rounded-r bg-gray-200 text-gray-700 font-semibold focus:outline-none"
        >
          YouTube
        </button>
      </div>
      <div id="fileInputSection" class="hidden mb-6">
        <label class="block mb-2 text-gray-700">Upload File</label>
        <div
          id="dropzone"
          class="flex items-center justify-center w-full h-32 p-4 border-2 border-dashed border-blue-400 rounded bg-blue-50 cursor-pointer text-blue-600"
        >
          Drag & Drop or Click to Upload
        </div>
        <input id="fileInput" type="file" class="hidden" />
        <div id="fileName" class="mt-2 text-sm text-gray-600"></div>
      </div>
      <div id="youtubeInputSection" class="hidden mb-6">
        <label class="block mb-2 text-gray-700">YouTube Link</label>
        <input
          id="youtubeInput"
          type="text"
          placeholder="Paste YouTube link here"
          class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>
      <button
        id="submitBtn"
        class="w-full py-2 mt-4 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition"
      >
        Process
      </button>
    </div>
    <!-- Step 2 -->
    <div id="step2" class="hidden flex flex-col items-center w-full px-4">
      <div id="loading" class="flex flex-col items-center">
        <svg
          class="animate-spin h-8 w-8 text-blue-600 mb-4"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v8z"
          ></path>
        </svg>
        <span class="text-blue-700 font-semibold">Processing...</span>
      </div>
      <div id="result" class="hidden w-full mt-6">
        <h3 class="text-lg font-bold mb-2">Result</h3>
        <div class="flex items-center gap-4 mb-4">
          <button
            id="playPauseBtn"
            class="px-4 py-2 bg-blue-500 text-white rounded font-bold"
          >
            Play
          </button>
          <label class="flex items-center gap-2 text-sm"
            >Speed
            <input
              id="speedRange"
              type="range"
              min="0.5"
              max="2"
              step="0.05"
              value="1"
              class="ml-2"
            />
            <span id="speedValue">1x</span>
          </label>
        </div>
        <div
          id="tabContainer"
          class="relative w-full overflow-x-auto bg-gray-100 rounded border"
          style="scroll-behavior: smooth"
        >
          <div id="tabContent" class="absolute top-0 left-0 h-full"></div>
        </div>
        <code
          id="jsonResult"
          class="block bg-gray-100 p-4 rounded text-xs overflow-x-auto mt-4"
        ></code>
        <button
          id="backBtn"
          class="mt-4 px-4 py-2 bg-gray-300 rounded hover:bg-gray-400"
        >
          Back
        </button>
      </div>
    </div>
    <script>
      // UI state
      const fileBtn = document.getElementById("fileBtn");
      const youtubeBtn = document.getElementById("youtubeBtn");
      const fileInputSection = document.getElementById("fileInputSection");
      const youtubeInputSection = document.getElementById(
        "youtubeInputSection"
      );
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("fileInput");
      const fileName = document.getElementById("fileName");
      const youtubeInput = document.getElementById("youtubeInput");
      const submitBtn = document.getElementById("submitBtn");
      const step1 = document.getElementById("step1");
      const step2 = document.getElementById("step2");
      const loading = document.getElementById("loading");
      const result = document.getElementById("result");
      const jsonResult = document.getElementById("jsonResult");
      const backBtn = document.getElementById("backBtn");

      let selectedType = "file";
      let uploadedFilePath = null;
      let uploadedFile = null;
      let audioElement = null;
      let notesData = null;
      let progressIndicator = null;

      function setType(type) {
        selectedType = type;
        if (type === "file") {
          fileBtn.classList.add("bg-blue-500", "text-white");
          fileBtn.classList.remove("bg-gray-200", "text-gray-700");
          youtubeBtn.classList.remove("bg-blue-500", "text-white");
          youtubeBtn.classList.add("bg-gray-200", "text-gray-700");
          fileInputSection.classList.remove("hidden");
          youtubeInputSection.classList.add("hidden");
        } else {
          youtubeBtn.classList.add("bg-blue-500", "text-white");
          youtubeBtn.classList.remove("bg-gray-200", "text-gray-700");
          fileBtn.classList.remove("bg-blue-500", "text-white");
          fileBtn.classList.add("bg-gray-200", "text-gray-700");
          fileInputSection.classList.add("hidden");
          youtubeInputSection.classList.remove("hidden");
        }
      }

      fileBtn.addEventListener("click", () => setType("file"));
      youtubeBtn.addEventListener("click", () => setType("youtube"));

      // Drag & drop logic
      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("bg-blue-100");
      });
      dropzone.addEventListener("dragleave", (e) => {
        e.preventDefault();
        dropzone.classList.remove("bg-blue-100");
      });
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("bg-blue-100");
        if (e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          handleFileChange();
        }
      });
      fileInput.addEventListener("change", handleFileChange);
      function handleFileChange() {
        if (fileInput.files.length) {
          uploadedFile = fileInput.files[0];
          fileName.textContent = uploadedFile.name;
        } else {
          uploadedFile = null;
          fileName.textContent = "";
        }
      }

      // Step logic
      submitBtn.addEventListener("click", async () => {
        if (selectedType === "file" && !uploadedFile) {
          alert("Please upload a file.");
          return;
        }
        if (selectedType === "youtube" && !youtubeInput.value.trim()) {
          alert("Please enter a YouTube link.");
          return;
        }
        step1.classList.add("hidden");
        step2.classList.remove("hidden");
        loading.classList.remove("hidden");
        result.classList.add("hidden");
        let contentPath = null;
        if (selectedType === "file") {
          // Upload file
          const formData = new FormData();
          formData.append("file", uploadedFile);
          const uploadRes = await fetch("/upload", {
            method: "POST",
            body: formData,
          });
          if (!uploadRes.ok) {
            loading.classList.add("hidden");
            result.classList.remove("hidden");
            jsonResult.textContent = JSON.stringify(
              { error: "File upload failed" },
              null,
              2
            );
            return;
          }
          const uploadData = await uploadRes.json();
          contentPath = uploadData.path;
          // Store the uploaded file path for audio playback
          uploadedFilePath = contentPath;
        } else {
          // YouTube processing: first extract vocals
          try {
            const ytRes = await fetch("/import_yt_vocals", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content_path: youtubeInput.value.trim() }),
            });
            if (!ytRes.ok) {
              loading.classList.add("hidden");
              result.classList.remove("hidden");
              jsonResult.textContent = JSON.stringify(
                { error: "Failed to extract YouTube vocals" },
                null,
                2
              );
              return;
            }
            const ytData = await ytRes.json();
            contentPath = ytData.path;
            // Store the extracted file path for audio playback
            uploadedFilePath = contentPath;
          } catch (err) {
            loading.classList.add("hidden");
            result.classList.remove("hidden");
            jsonResult.textContent = JSON.stringify(
              { error: "YouTube extraction request failed" },
              null,
              2
            );
            return;
          }
        }
        // Call pipeline
        try {
          const res = await fetch("/pipeline", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content_path: contentPath }),
          });
          const data = await res.json();
          loading.classList.add("hidden");
          result.classList.remove("hidden");
          jsonResult.textContent = JSON.stringify(
            { message: "Success" },
            null,
            2
          );
          if (data.notes && Array.isArray(data.notes)) {
            notesData = data.notes;
            renderTab(data.notes);
            // Create audio element for both file and YouTube
            if (uploadedFilePath) {
              createAudioElement();
            }
          }
        } catch (err) {
          loading.classList.add("hidden");
          result.classList.remove("hidden");
          jsonResult.textContent = JSON.stringify(
            { error: "Pipeline request failed" },
            null,
            2
          );
        }
      });
      backBtn.addEventListener("click", () => {
        if (audioElement) {
          audioElement.pause();
          audioElement.currentTime = 0;
          audioElement.remove();
          audioElement = null;
        }
        isPlaying = false;
        playPauseBtn.textContent = "Play";
        tabContainer.scrollLeft = 0;
        speedRange.value = 1;
        speedValue.textContent = "1x";
        uploadedFilePath = null;
        notesData = null;
        progressIndicator = null;
        step2.classList.add("hidden");
        step1.classList.remove("hidden");
        loading.classList.remove("hidden");
        result.classList.add("hidden");
        jsonResult.textContent = "";
        fileInput.value = "";
        fileName.textContent = "";
        youtubeInput.value = "";
        uploadedFile = null;
        setType("file");
      });
      // Default to file type
      setType("file");

      // --- Tab rendering and scroll logic ---
      // Constants for rendering
      const PX_PER_SECOND = 100;
      const PX_PER_OCTAVE = 30;
      const NOTE_BASE_Y = 200; // px from top for lowest note
      const NOTE_HEIGHT = 18;
      const NOTE_COLORS = [
        "bg-blue-400",
        "bg-green-400",
        "bg-yellow-400",
        "bg-pink-400",
        "bg-purple-400",
        "bg-red-400",
        "bg-teal-400",
      ];
      // MIDI note numbers for vertical mapping
      function noteToMidi(note, octave) {
        const NOTE_ORDER = [
          "C",
          "C#",
          "D",
          "D#",
          "E",
          "F",
          "F#",
          "G",
          "G#",
          "A",
          "A#",
          "B",
        ];
        return NOTE_ORDER.indexOf(note) + 12 * (octave + 1);
      }
      function getMinMaxMidi(notes) {
        let min = Infinity,
          max = -Infinity;
        for (const n of notes) {
          const midi = noteToMidi(n.note, n.octave);
          if (midi < min) min = midi;
          if (midi > max) max = midi;
        }
        return [min, max];
      }
      function renderTab(notes) {
        const tabContent = document.getElementById("tabContent");
        tabContent.innerHTML = "";
        if (!notes.length) return;
        // Find min/max for scaling
        const [minMidi, maxMidi] = getMinMaxMidi(notes);
        const midiRange = maxMidi - minMidi + 1;
        // Find max end time for total width
        const maxEnd = Math.max(...notes.map((n) => n.end));
        const height = midiRange * PX_PER_OCTAVE + 40;
        const width = maxEnd * PX_PER_SECOND + 100;
        tabContent.style.height = height + "px";
        tabContainer.style.height = height + 20 + "px";
        tabContent.style.width = width + "px";
        // Create progress indicator
        progressIndicator = document.createElement("div");
        progressIndicator.className = "absolute bg-red-500 opacity-70";
        progressIndicator.style.width = "2px";
        progressIndicator.style.height = "100%";
        progressIndicator.style.top = "0px";
        progressIndicator.style.left = "0px";
        progressIndicator.style.zIndex = "10";
        tabContainer.appendChild(progressIndicator);
        // Render each note as a bar
        notes.forEach((n, i) => {
          const midi = noteToMidi(n.note, n.octave);
          const y = (maxMidi - midi) * PX_PER_OCTAVE + 20;
          const x = n.start * PX_PER_SECOND;
          const width = Math.max((n.end - n.start) * PX_PER_SECOND, 8);
          const color = NOTE_COLORS[i % NOTE_COLORS.length];
          const bar = document.createElement("div");
          bar.className = `absolute ${color} rounded shadow text-xs flex items-center justify-center`;
          bar.style.left = x + "px";
          bar.style.top = y + "px";
          bar.style.width = width + "px";
          bar.style.height = NOTE_HEIGHT + "px";
          bar.textContent = n.note + n.octave;
          tabContent.appendChild(bar);
        });
      }
      // --- Audio Functions ---
      function createAudioElement() {
        if (audioElement) {
          audioElement.remove();
        }
        audioElement = document.createElement("audio");
        audioElement.src = "/" + uploadedFilePath;
        audioElement.preload = "auto";
        audioElement.addEventListener("timeupdate", updateProgressIndicator);
        audioElement.addEventListener("ended", () => {
          isPlaying = false;
          playPauseBtn.textContent = "Play";
        });
        // Add audio controls above the tab for debugging
        const audioContainer = document.createElement("div");
        audioContainer.className = "mb-2";
        audioContainer.appendChild(audioElement);
        document
          .getElementById("result")
          .insertBefore(
            audioContainer,
            document.getElementById("tabContainer")
          );
      }
      function updateProgressIndicator() {
        if (audioElement && progressIndicator) {
          const currentTime = audioElement.currentTime;
          const leftPosition = currentTime * PX_PER_SECOND;
          progressIndicator.style.left = leftPosition + "px";
          // Auto-scroll to follow the progress
          const tabContainer = document.getElementById("tabContainer");
          const containerWidth = tabContainer.offsetWidth;
          const scrollPosition = leftPosition - containerWidth / 2;
          tabContainer.scrollLeft = Math.max(0, scrollPosition);
        }
      }
      // --- Play/Pause and Scroll Logic ---
      let isPlaying = false;
      let scrollSpeed = 1; // 1x
      const playPauseBtn = document.getElementById("playPauseBtn");
      const speedRange = document.getElementById("speedRange");
      const speedValue = document.getElementById("speedValue");
      const tabContainer = document.getElementById("tabContainer");
      playPauseBtn.addEventListener("click", () => {
        isPlaying = !isPlaying;
        playPauseBtn.textContent = isPlaying ? "Pause" : "Play";
        if (isPlaying) {
          if (audioElement) {
            audioElement.playbackRate = scrollSpeed;
            audioElement.play();
          }
        } else {
          if (audioElement) {
            audioElement.pause();
          }
        }
      });
      speedRange.addEventListener("input", () => {
        scrollSpeed = parseFloat(speedRange.value);
        speedValue.textContent = scrollSpeed.toFixed(2) + "x";
        if (audioElement) {
          audioElement.playbackRate = scrollSpeed;
        }
      });
    </script>
  </body>
</html>
